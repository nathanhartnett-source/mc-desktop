<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mission Control</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eee;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
  .card { width: 360px; padding: 28px; background: #141414; border: 1px solid #262626; border-radius: 12px; }
  h1 { margin: 0 0 4px; font-size: 18px; }
  p { margin: 0 0 18px; color: #888; font-size: 13px; }
  input { width: 100%; box-sizing: border-box; padding: 10px 12px; background: #0a0a0a;
    border: 1px solid #2a2a2a; border-radius: 8px; color: #eee; font-size: 14px; }
  input:focus { outline: none; border-color: #4a90e2; }
  button { margin-top: 12px; width: 100%; padding: 10px; background: #4a90e2; color: white;
    border: 0; border-radius: 8px; font-size: 14px; cursor: pointer; }
  button:hover { background: #5aa0f2; }
  .err { color: #e26a6a; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
<script>
  const saved = localStorage.getItem("mc_url");
  if (saved) location.replace(saved);
</script>
<div class="wrap">
  <div class="card">
    <h1>Mission Control</h1>
    <p>Enter the URL of your Mission Control instance.</p>
    <input id="url" type="url" placeholder="https://mc.allhart.com.au" autofocus />
    <button id="go">Connect</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
  const input = document.getElementById("url");
  const err = document.getElementById("err");
  function go() {
    let v = input.value.trim();
    if (!v) { err.textContent = "URL required"; return; }
    if (!/^https?:\/\//i.test(v)) v = "https://" + v;
    try { new URL(v); } catch { err.textContent = "Invalid URL"; return; }
    localStorage.setItem("mc_url", v);
    location.replace(v);
  }
  document.getElementById("go").onclick = go;
  input.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
</script>
</body>
</html>
